services:
  app:
    container_name: bakdrop
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - bakdrop_data:/var/lib/bakdrop
      - bakdrop_files:/fsr
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BASE_URL=https://your-IP-or-domain
      - FILES_PATH=/your-data-dir
      - DEFAULT_LANG=en
      - TZ=Europe/Warsaw
    restart: unless-stopped

volumes:
  bakdrop_data:
  bakdrop_files:
  vendor: