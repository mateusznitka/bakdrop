services:
  app:
    container_name: bakdrop
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - bakdrop_data:/var/lib/bakdrop
      - /fsr:/fsr
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BASE_URL=https://10.10.50.253
      - DEFAULT_LANG=en
      - TZ=Europe/Warsaw
    restart: unless-stopped

volumes:
  bakdrop_data: